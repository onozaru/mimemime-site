<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>お申し込みありがとうございます | mimemime</title>
<meta name="robots" content="noindex">
<link rel="icon" href="/favicon.png" type="image/png">
<style>
:root{--main:#3A7CA5;--dark:#1F3A4D;--green:#27AE60;--accent:#F2A65A;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Helvetica Neue',Arial,'Hiragino Sans','Meiryo',sans-serif;background:#f4f8fb;color:var(--dark);line-height:1.8;display:flex;flex-direction:column;min-height:100vh;}
nav{background:var(--dark);padding:0 24px;height:60px;display:flex;align-items:center;}
.nav-logo{color:#fff;font-size:1.1rem;font-weight:bold;text-decoration:none;}
.nav-logo span{color:var(--accent);}
main{flex:1;display:flex;align-items:center;justify-content:center;padding:60px 24px;}
.card{background:#fff;border-radius:20px;padding:48px 40px;text-align:center;max-width:520px;box-shadow:0 4px 24px rgba(0,0,0,.08);}
.check-icon{width:72px;height:72px;background:#e8f8ee;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 24px;}
h1{font-size:1.6rem;color:var(--green);margin-bottom:12px;}
.sub{font-size:1rem;color:#555;margin-bottom:28px;line-height:1.9;}
.timeline{background:#f4f8fb;border-radius:12px;padding:20px 24px;margin-bottom:28px;text-align:left;}
.timeline h3{font-size:.9rem;color:var(--main);margin-bottom:12px;}
.timeline-item{display:flex;gap:12px;margin-bottom:10px;font-size:.88rem;color:#444;}
.timeline-item:last-child{margin-bottom:0;}
.step-num{width:22px;height:22px;background:var(--main);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:bold;flex-shrink:0;margin-top:2px;}
.btn-row{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;}
.btn{display:inline-block;padding:12px 28px;border-radius:10px;text-decoration:none;font-weight:bold;font-size:.95rem;}
.btn-main{background:var(--main);color:#fff;}
.btn-sub{background:#f0f4f8;color:var(--dark);}
footer{background:#111;color:#888;text-align:center;padding:20px;font-size:.85rem;}
</style>
</head>
<body>
<nav><a href="/" class="nav-logo">mime<span>mime</span></a></nav>
<main>
  <div class="card">
    <div class="check-icon">
      <svg viewBox="0 0 40 40" width="36" height="36" fill="none" stroke="#27AE60" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="20" cy="20" r="16"/>
        <path d="m13 20.5 4.5 4.5 9.5-10"/>
      </svg>
    </div>
    <h1>ありがとうございます！</h1>
    <p class="sub">相談のお申し込みを受け付けました。<br>担当者（新井）より<strong>24時間以内</strong>にメールでご連絡いたします。</p>
    <div class="timeline">
      <h3>次のステップ</h3>
      <div class="timeline-item">
        <div class="step-num">1</div>
        <div>担当者よりメールでご連絡します（24時間以内）</div>
      </div>
      <div class="timeline-item">
        <div class="step-num">2</div>
        <div>日程を調整し、ZoomまたはGoogle Meetで30分の無料相談を実施します</div>
      </div>
      <div class="timeline-item">
        <div class="step-num">3</div>
        <div>相談後、必要に応じてご支援の内容を一緒に考えます（継続は任意・強制なし）</div>
      </div>
    </div>
    <div class="btn-row">
      <a href="/" class="btn btn-main">ホームへ戻る</a>
      <a href="/blog/" class="btn btn-sub">ブログを読む</a>
    </div>
  </div>
</main>
<footer><p>© 2026 株式会社mimemime（まいむまいむ）</p></footer>
</body>
</html>
