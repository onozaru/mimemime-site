<meta charset="UTF-8">
<meta name="description" content="mimemimeの無料相談フォーム。初回60分・完全無料・オンライン対応。うまく話せなくて大丈夫です。">
<link rel="icon" href="/favicon.png" type="image/png">
<link rel="icon" href="/favicon-16.png" sizes="16x16" type="image/png">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>無料相談申し込み | mimemime ラーニング</title>
<style>
:root{--main:#3A7CA5;--accent:#F2A65A;--dark:#1F3A4D;--light:#EBF5FB;--gray:#7F8C8D;--bg:#F4F8FB;--green:#27AE60;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Helvetica Neue',Arial,'Hiragino Sans','Meiryo',sans-serif;background:var(--bg);color:var(--dark);line-height:1.8;}
nav{background:var(--dark);padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:60px;position:sticky;top:0;z-index:100;}
.nav-logo{color:#fff;font-size:1.1rem;font-weight:bold;text-decoration:none;}.nav-logo span{color:var(--accent);}
.nav-links a{color:#ccc;text-decoration:none;font-size:.9rem;margin-left:20px;}
.hero{background:linear-gradient(135deg,var(--dark),#2c5f7a);color:#fff;padding:60px 24px;text-align:center;}
.hero h1{font-size:clamp(1.6rem,3vw,2.4rem);margin-bottom:12px;}
.hero p{color:rgba(255,255,255,.85);max-width:560px;margin:0 auto;}
.main{max-width:720px;margin:0 auto;padding:60px 24px;}
.form-card{background:#fff;border-radius:16px;padding:40px;box-shadow:0 4px 20px rgba(0,0,0,.08);}
.form-card h2{color:var(--main);margin-bottom:8px;font-size:1.3rem;}
.form-card p{color:var(--gray);font-size:.9rem;margin-bottom:28px;}
.form-group{margin-bottom:20px;}
label{display:block;font-size:.9rem;font-weight:bold;color:var(--dark);margin-bottom:6px;}
label .req{color:#e74c3c;font-size:.8rem;margin-left:4px;}
input,select,textarea{width:100%;padding:12px 14px;border:1px solid #ddd;border-radius:8px;font-size:.95rem;font-family:inherit;transition:border-color .2s;}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--main);}
textarea{resize:vertical;min-height:100px;}
.radio-group{display:flex;flex-direction:column;gap:10px;}
.radio-label{display:flex;align-items:center;gap:10px;cursor:pointer;font-size:.95rem;}
.radio-label input{width:auto;}
.submit-btn{width:100%;background:var(--main);color:#fff;border:none;padding:16px;border-radius:10px;font-size:1.05rem;font-weight:bold;cursor:pointer;transition:background .2s;margin-top:8px;}
.submit-btn:hover{background:var(--dark);}
.privacy-note{font-size:.8rem;color:var(--gray);text-align:center;margin-top:16px;}
.privacy-note a{color:var(--main);}
.safe-box{background:var(--light);border-radius:12px;padding:20px 24px;margin-bottom:28px;}
.safe-box h4{color:var(--main);margin-bottom:8px;font-size:.95rem;}
.safe-box p{font-size:.85rem;color:var(--gray);}
footer{background:#111;color:#888;text-align:center;padding:24px;font-size:.85rem;}

/* ハンバーガーメニュー */
.hamburger{display:none;flex-direction:column;gap:5px;cursor:pointer;padding:8px;margin-right:-8px;background:none;border:none;}
.hamburger span{width:22px;height:2px;background:#fff;border-radius:2px;transition:.3s;display:block;}
.hamburger.open span:nth-child(1){transform:translateY(7px) rotate(45deg);}
.hamburger.open span:nth-child(2){opacity:0;}
.hamburger.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg);}
@media(max-width:768px){
  .hamburger{display:flex;}
  .nav-links{display:none!important;flex-direction:column!important;position:fixed;top:64px;left:0;right:0;background:var(--dark);padding:20px 32px;gap:20px;z-index:999;box-shadow:0 6px 20px rgba(0,0,0,.4);}
  .nav-links.open{display:flex!important;}
  .nav-links a{font-size:1rem;padding:4px 0;border-bottom:1px solid rgba(255,255,255,.1);}
  .nav-links .nav-cta{border:none;text-align:center;}
}
</style>
<meta property="og:image" content="https://mimemime.com/og-image.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta name="twitter:image" content="https://mimemime.com/og-image.png">
</head>
<body>
<nav>
  <a href="index.html" class="nav-logo">mime<span>mime</span> ラーニング</a>
  <div class="nav-links"><a href="index.html">コース一覧</a></div>
<button class="hamburger" aria-label="メニューを開く" onclick="this.classList.toggle('open');document.querySelector('.nav-links').classList.toggle('open');"><span></span><span></span><span></span></button>
</nav>
<div class="hero">
  <h1>無料相談申し込み</h1>
  <p>30分の無料オンライン相談で、あなたの状況をお聞きします。<br>どんな小さな悩みでも、まず話してみてください。</p>
</div>
<div class="main">
  <div class="form-card" id="formArea">
    <h2>初回無料相談フォーム</h2>
    <p>入力後、担当スタッフより24時間以内にご連絡いたします。</p>
    <div class="safe-box">
      <h4>安心してご利用ください</h4>
      <p>入力いただいた情報は、相談対応のみに使用します。勧誘・営業連絡は一切行いません。断っていただいても全く問題ありません。</p>
    </div>
    <!-- ★修正: action属性追加、data-netlify=true、全フィールドにname属性 -->
    <form name="contact" method="POST" action="/contact-thanks.html" data-netlify="true">
      <input type="hidden" name="form-name" value="contact">
      <div class="form-group">
        <label for="f-name">お名前（ニックネームでもOK）<span class="req">必須</span></label>
        <input id="f-name" type="text" name="name" placeholder="例：田中　または　たーちゃん" required>
      </div>
      <div class="form-group">
        <label for="f-email">連絡先メールアドレス<span class="req">必須</span></label>
        <input id="f-email" type="email" name="email" placeholder="example@email.com" required>
      </div>
      <div class="form-group">
        <label for="f-contact">ご希望の連絡方法</label>
        <select id="f-contact" name="contact_method">
          <option value="メール">メール</option>
          <option value="LINE">LINE（後ほど案内します）</option>
          <option value="どちらでもOK">どちらでもOK</option>
        </select>
      </div>
      <div class="form-group">
        <label>今の状況に近いものを選んでください</label>
        <div class="radio-group">
          <label class="radio-label"><input type="radio" name="status" value="就職・復職を検討中"> 就職・復職を考えているが、まず話を聞きたい</label>
          <label class="radio-label"><input type="radio" name="status" value="就労移行支援を検討中"> 就労移行支援の利用を検討している</label>
          <label class="radio-label"><input type="radio" name="status" value="在職中の困りごと"> 働いているが職場での困りごとがある</label>
          <label class="radio-label"><input type="radio" name="status" value="家族・配偶者の相談"> 家族・配偶者の就労について相談したい</label>
          <label class="radio-label"><input type="radio" name="status" value="その他"> その他・わからない</label>
        </div>
      </div>
      <div class="form-group">
        <label for="f-message">今、一番困っていること・気になっていること（自由記述）</label>
        <textarea id="f-message" name="message" placeholder="どんな小さなことでも大丈夫です。思ったままに書いてみてください。"></textarea>
      </div>
      <div class="form-group">
        <label>ご都合のよい時間帯（複数選択可）</label>
        <div class="radio-group">
          <label class="radio-label"><input type="checkbox" name="time[]" value="平日午前（10時〜12時）"> 平日午前（10時〜12時）</label>
          <label class="radio-label"><input type="checkbox" name="time[]" value="平日午後（13時〜17時）"> 平日午後（13時〜17時）</label>
          <label class="radio-label"><input type="checkbox" name="time[]" value="平日夕方（17時〜20時）"> 平日夕方（17時〜20時）</label>
          <label class="radio-label"><input type="checkbox" name="time[]" value="土日祝"> 土日祝</label>
        </div>
      </div>
      <!-- ★修正: type="submit"に変更。onclick削除 -->
      <button type="submit" class="submit-btn">相談を申し込む（無料）</button>
      <p class="privacy-note">送信することで<a href="privacy.html">プライバシーポリシー</a>に同意したことになります</p>
    </form>
  </div>
</div>
<footer><p>© 2026 株式会社mimemime（まいむまいむ）</p></footer>
</body>
</html>
